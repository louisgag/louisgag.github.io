            color: #333;
        }
        
        .container {
            background: white;

            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 2.2em;
        }
        
        .score {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #2d3748;
        }
        
        .correct { color: #38a169; font-weight: bold; }
        .incorrect { color: #e53e3e; font-weight: bold; }
        .review { color: #d69e2e; font-weight: bold; }
        
        .question-card {
            background: #f7fafc;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            border-left: 5px solid #4299e1;
            transition: all 0.3s ease;
        }
        
        .question-card.review {
            border-left: 5px solid #d69e2e;
            background: #fffaf0;
        }
        
        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .word {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #2d3748;
        }
        
        .translation {
            text-align: center;
            font-style: italic;
            color: #718096;
            margin-bottom: 20px;
        }
        
        .review-indicator {
            text-align: center;
            color: #d69e2e;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .article-btn {
            padding: 15px 25px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 80px;
        }
        
        .der-btn {
            background: #3182ce;
            color: white;
        }
        
        .die-btn {
            background: #e53e3e;
            color: white;
        }
        
        .das-btn {
            background: #38a169;
            color: white;
        }
        
        .article-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        .article-btn:active {
            transform: scale(0.95);
        }
        
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .feedback.show {
            opacity: 1;
        }
        
        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
            border: 2px solid #38a169;
        }
        
        .feedback.incorrect {
            background: #fed7d7;
            color: #742a2a;
            border: 2px solid #e53e3e;
        }
        
        .next-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 30px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .next-btn.show {
            opacity: 1;
        }
        
        .next-btn:hover {
            background: #3182ce;
            transform: translateY(-1px);
        }
        
        .progress {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4299e1, #38a169);
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 15px;
            background: #edf2f7;
            border-radius: 10px;
            font-size: 0.9em;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            display: block;
        }

document.getElementById('title').textContent = `🇩🇪 Pratique des articles allemands, (${words.length} mots)`;

let currentWordIndex = 0;
let correctCount = 0;
let incorrectCount = 0;
let totalQuestions = 0;
let masteredWords = new Set();

// Système de répétition espacée
let reviewQueue = []; // Mots à réviser avec leur délai
let questionsSinceLastReview = 0;
const REVIEW_INTERVAL = 5; // Révision après 5 questions

let shuffledWords = shuffle([...words]);
let currentWord = null;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function addToReviewQueue(word) {
    // Ajouter un mot à la file de révision avec un délai
    const reviewItem = {
        word: word,
        questionsToWait: REVIEW_INTERVAL
    };
    reviewQueue.push(reviewItem);
    updateStats();
}

function updateReviewQueue() {
    // Décrémenter le délai de tous les mots en attente
    reviewQueue.forEach(item => {
        if (item.questionsToWait > 0) {
            item.questionsToWait--;
        }
    });
}

function getNextWord() {
    // Vérifier s'il y a des mots prêts à réviser
    const readyToReview = reviewQueue.filter(item => item.questionsToWait <= 0);
    
    if (readyToReview.length > 0) {
        // Prendre un mot à réviser
        const reviewItem = readyToReview[0];
        reviewQueue = reviewQueue.filter(item => item !== reviewItem);
        questionsSinceLastReview = 0;
        return { word: reviewItem.word, isReview: true };
    }
    
    // Sinon, prendre le prochain mot de la séquence normale
    if (currentWordIndex >= shuffledWords.length) {
        // Recommencer avec les mots non maîtrisés
        const unmastered = words.filter(w => !masteredWords.has(w.word));
        if (unmastered.length === 0) {
            // Tous les mots sont maîtrisés, recommencer
            masteredWords.clear();
            shuffledWords = shuffle([...words]);
        } else {
            shuffledWords = shuffle(unmastered);
        }
        currentWordIndex = 0;
    }
    
    questionsSinceLastReview++;
    return { word: shuffledWords[currentWordIndex++], isReview: false };
}

function displayWord() {
    const wordData = getNextWord();
    currentWord = wordData.word;
    const isReview = wordData.isReview;
    
    document.getElementById('word').textContent = currentWord.word;
    document.getElementById('translation').textContent = `(${currentWord.translation})`;
    
    // Indicateur de révision
    const reviewIndicator = document.getElementById('review-indicator');
    const questionCard = document.getElementById('question-card');
    
    if (isReview) {
        reviewIndicator.style.display = 'block';
        questionCard.classList.add('review');
    } else {
        reviewIndicator.style.display = 'none';
        questionCard.classList.remove('review');
    }
    
    document.getElementById('feedback').classList.remove('show');
    document.getElementById('next-btn').classList.remove('show');
    
    // Enable buttons
    document.querySelectorAll('.article-btn').forEach(btn => {
        btn.disabled = false;
        btn.style.opacity = '1';
    });
    
    updateStats();
}

function checkAnswer(selectedArticle) {
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    
    totalQuestions++;
    updateReviewQueue(); // Mettre à jour les délais
    
    // Disable buttons
    document.querySelectorAll('.article-btn').forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = '0.6';
    });
    
    if (selectedArticle === currentWord.article) {
        correctCount++;
        masteredWords.add(currentWord.word);
        feedback.textContent = `✅ Correct ! ${currentWord.article} ${currentWord.word}`;
        feedback.className = 'feedback correct show';
    } else {
        incorrectCount++;
        masteredWords.delete(currentWord.word); // Retirer de la liste des maîtrisés
        addToReviewQueue(currentWord); // Ajouter à la file de révision
        feedback.textContent = `❌ Incorrect ! C'est "${currentWord.article} ${currentWord.word}" - Vous le reverrez bientôt !`;
        feedback.className = 'feedback incorrect show';
    }
    
    updateScore();
    updateStats();
    nextBtn.classList.add('show');
}

function nextQuestion() {
    displayWord();
}

function updateScore() {
    document.getElementById('correct').textContent = correctCount;
    document.getElementById('incorrect').textContent = incorrectCount;
    
    const percentage = (correctCount / Math.max(totalQuestions, 1)) * 100;
    document.getElementById('progress-bar').style.width = percentage + '%';
}

function updateStats() {
    document.getElementById('to-review').textContent = reviewQueue.length;
    document.getElementById('mastered').textContent = masteredWords.size;
    
    const readyToReview = reviewQueue.filter(item => item.questionsToWait <= 0).length;
    const nextReviewIn = reviewQueue.length > 0 ? Math.min(...reviewQueue.map(item => item.questionsToWait)) : -1;
    
    if (readyToReview > 0) {
        document.getElementById('questions-until-review').textContent = "Maintenant !";
        document.getElementById('questions-until-review').style.color = "#d69e2e";
    } else if (nextReviewIn >= 0) {
        document.getElementById('questions-until-review').textContent = nextReviewIn;
        document.getElementById('questions-until-review').style.color = "#4a5568";
    } else {
        document.getElementById('questions-until-review').textContent = "-";
        document.getElementById('questions-until-review').style.color = "#4a5568";
    }
}

// Initialize
displayWord();
updateScore();
