<head>

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            margin: 0 auto;

        }
        
        .container {

            border-radius: 10px;
            padding: 30px;

        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 1.2em; 
            margin-bottom: 15px;
        }
        
        .question-counter {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        
        .question {
            font-size: 1.2em;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }
        
        .options {
            margin-bottom: 20px;
        }
        
        .option {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .option:hover {
            background-color: #f8f9fa;
            border-color: #3498db;
        }
        
        .option input[type="radio"] {
            margin-right: 10px;
        }
        
        .option.correct {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        
        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .feedback.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .feedback.incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .explanation {
            margin-top: 10px;
            font-weight: normal;
            font-style: italic;
        }
        
        .buttons {
            text-align: center;
            margin-top: 25px;
        }

            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        
        .final-score {

            font-size: 1.3em;
            color: #2c3e50;

    <div class="container">

        // Mélanger les questions aléatoirement
        function shuffleQuestions(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Questions mélangées pour cette session
        let questions = shuffleQuestions(allQuestions);
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        function displayQuestion() {
            const question = questions[currentQuestionIndex];
            document.getElementById('current-question').textContent = currentQuestionIndex + 1;
            document.getElementById('total-questions').textContent = questions.length;
            document.getElementById('question-text').textContent = question.sentence;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `
                    <input type="radio" name="answer" value="${index}" id="option-${index}">
                    <label for="option-${index}">${option}</label>
                `;
                optionDiv.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(optionDiv);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            answered = false;
        }

        function selectAnswer(selectedIndex) {
            if (answered) return;
            
            const question = questions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');
            
            // Marquer la réponse sélectionnée
            document.getElementById(`option-${selectedIndex}`).checked = true;
            
            // Colorer les options
            options.forEach((option, index) => {
                if (index === question.correct) {
                    option.classList.add('correct');
                } else if (index === selectedIndex && index !== question.correct) {
                    option.classList.add('incorrect');
                }
            });
            
            // Afficher le feedback
            const isCorrect = selectedIndex === question.correct;
            feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedback.innerHTML = `
                <div>${isCorrect ? '✅ Correct !' : '❌ Incorrect'}</div>
                <div class="explanation">
                    Bonne réponse : <strong>${question.options[question.correct]}</strong><br>
                    ${question.explanation}
                </div>
            `;
            feedback.style.display = 'block';
            
            if (isCorrect) score++;
            answered = true;
            
            // Afficher le bouton suivant
            if (currentQuestionIndex < questions.length - 1) {
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                showFinalScore();
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            displayQuestion();
        }

        function showFinalScore() {
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('feedback').innerHTML += `
                <div class="final-score">
                    <h3>Quiz terminé !</h3>
                    Score : ${score}/${questions.length} (${percentage}%)
                </div>
            `;
            document.getElementById('restart-btn').style.display = 'inline-block';
        }

        function restartQuiz() {
            // Remélanger les questions
            questions = shuffleQuestions(allQuestions);
            
            currentQuestionIndex = 0;
            score = 0;
            answered = false;
            document.getElementById('restart-btn').style.display = 'none';
            displayQuestion();
        }

        // Initialiser le quiz
        displayQuestion();
    </script>
