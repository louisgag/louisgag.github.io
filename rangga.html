            color: #718096;

        }
        
        .buttons {

            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .article-btn {
            padding: 15px 25px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 80px;
        }
        
        .der-btn {
            background: #3182ce;
            color: white;
        }
        
        .die-btn {
            background: #e53e3e;
            color: white;
        }
        
        .das-btn {
            background: #38a169;
            color: white;
        }
        
        .none-btn {
            background: #0000f1;
            color: white;
        }
        
        .article-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        .article-btn:active {
            transform: scale(0.95);
        }
        
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .feedback.show {
            opacity: 1;
        }
        
        .feedback.correct {
            background: #c6f6d5;
            color: #22543d;
            border: 2px solid #38a169;
        }
        
        .feedback.incorrect {
            background: #fed7d7;
            color: #742a2a;
            border: 2px solid #e53e3e;
        }
        
        .next-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 30px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .next-btn.show {
            opacity: 1;
        }
        
        .next-btn:hover {
            background: #3182ce;
            transform: translateY(-1px);
        }

            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        let currentWord = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let totalQuestions = 0;
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        let shuffledWords = shuffle([...words]);
        
        function displayWord() {
            const word = shuffledWords[currentWord];
            document.getElementById('word').textContent = word.word;
            document.getElementById('translation').textContent = `(${word.translation})`;
            
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('next-btn').classList.remove('show');
            
            // Enable buttons
            document.querySelectorAll('.article-btn').forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = '1';
            });
        }
        
        function checkAnswer(selectedArticle) {
            const word = shuffledWords[currentWord];
            const feedback = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');
            
            totalQuestions++;
            updateProgress();
            
            // Disable buttons
            document.querySelectorAll('.article-btn').forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.6';
            });
            
            if (selectedArticle === word.article) {
                correctCount++;
                feedback.textContent = `✅ Correct ! ${word.article} ${word.word}`;
                feedback.className = 'feedback correct show';
            } else {
                incorrectCount++;
                feedback.textContent = `❌ Incorrect ! C'est "${word.article} ${word.word}"`;
                feedback.className = 'feedback incorrect show';
            }
            
            updateScore();
            nextBtn.classList.add('show');
        }
        
        function nextQuestion() {
            currentWord++;
            if (currentWord >= shuffledWords.length) {
                // Reshuffle and restart
                shuffledWords = shuffle([...words]);
                currentWord = 0;
            }
            displayWord();
        }
        
        function updateScore() {
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('incorrect').textContent = incorrectCount;
        }
        
        function updateProgress() {
            const percentage = (correctCount / Math.max(totalQuestions, 1)) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }
        
        // Initialize
        displayWord();
        updateScore();
